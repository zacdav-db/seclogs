name: Approved PR Tests

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

concurrency:
  group: approved-pr-tests-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Test approved PR
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout approved PR head
        if: github.event_name == 'pull_request_review'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.review.commit_id }}
          persist-credentials: false

      - name: Checkout workflow dispatch ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Report approved commit
        if: github.event_name == 'pull_request_review'
        env:
          APPROVED_COMMIT: ${{ github.event.review.commit_id }}
          PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          echo "Testing approved commit ${APPROVED_COMMIT}"
          echo "PR head repository ${PR_HEAD_REPOSITORY}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Check formatting
        run: cargo fmt --check

      - name: Check whitespace
        run: git diff --check

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Check optional Rust features
        run: |
          set -euo pipefail
          cargo check --workspace --all-targets --features python
          cargo check --workspace --all-targets --features zerobus
          cargo check --workspace --all-targets --features databricks_volume

      - name: Build Python extension
        run: python -m pip install --no-input -e .

      - name: Run Python smoke tests
        run: |
          set -euo pipefail
          python - <<'PY'
          import seclog

          population = seclog.Population(size=10, seed=42)
          config = seclog.default_config(population=population, sources=["okta"])
          events = seclog.generate_from_config(config, max_events=3)

          assert events
          assert events[0]["envelope"]["source"] == "okta_system_log"
          assert events[0]["payload"]["eventType"]
          assert seclog.identities(population)
          PY
