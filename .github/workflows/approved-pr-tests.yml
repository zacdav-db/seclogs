name: Approved PR Tests

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: approved-pr-tests-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Test approved PR
    if: github.event_name == 'workflow_dispatch' || github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout approved PR head
        if: github.event_name == 'pull_request_review'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout workflow dispatch ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check whitespace
        run: git diff --check

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Check optional Rust features
        run: |
          cargo check --workspace --all-targets --features python
          cargo check --workspace --all-targets --features zerobus
          cargo check --workspace --all-targets --features databricks_volume

      - name: Build Python extension
        run: python -m pip install -e .

      - name: Run Python smoke tests
        run: |
          python - <<'PY'
          import seclog

          population = seclog.Population(size=10, seed=42)
          config = seclog.default_config(population=population, sources=["okta"])
          events = seclog.generate_from_config(config, max_events=3)

          assert events
          assert events[0]["envelope"]["source"] == "okta_system_log"
          assert events[0]["payload"]["eventType"]
          assert seclog.identities(population)
          PY
